<!DOCTYPE html>
<html>
<head>
    <title>Add New Program</title>
    <script>
        function validateForm() {
            let code = document.forms["programForm"]["programCode"].value;
            let name = document.forms["programForm"]["programName"].value;
            if (code === "" || name === "") {
                alert("All fields must be filled out!");
                return false;
            }
            return true;
        }
    </script>
</head>
<body>
    <h2>Add New Program</h2>
    <form name="programForm" action="add-new-program.php" method="POST" onsubmit="return validateForm()">
        <label for="programCode">Program Code:</label>
        <input type="text" name="programCode"><br><br>
        
        <label for="programName">Program Name:</label>
        <input type="text" name="programName"><br><br>
        
        <input type="submit" value="Add Program">
    </form>
</body>
</html>
